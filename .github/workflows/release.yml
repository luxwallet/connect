name: Release
# Publishes @luxwallet/connect to npm on a v* tag. Go module (go/) publishes via
# its own `go/vX.Y.Z` tag (Go modules are git-tag-based — no step needed here).
#
# PREREQUISITE (one-time, owner action): the `@luxwallet` npm org must exist and
# an automation token stored as the `NPM_TOKEN` repo/org secret. hanzo-dev has
# read-write to @hanzo/@luxfi already; @luxwallet just needs creating + the token.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
